# NeuroLearn OS — Hackathon stack (Qdrant vector DB)
# Run: docker compose up -d
# Then set in .env: QDRANT_URL=http://localhost:6333  MEMORY_PROVIDER=qdrant

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: neurolearn-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
